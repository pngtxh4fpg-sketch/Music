<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Musik Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0a0a0f; min-height: 100%; }
    @keyframes bar1 { from { height: 4px; } to { height: 22px; } }
    @keyframes bar2 { from { height: 8px; } to { height: 16px; } }
    @keyframes bar3 { from { height: 6px; } to { height: 24px; } }
    @keyframes bar4 { from { height: 10px; } to { height: 14px; } }
    @keyframes bar5 { from { height: 5px; } to { height: 20px; } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3f3f5a; border-radius: 2px; }
    .track-row:hover { background: #120f24 !important; }
    .icon-btn:hover { opacity: 0.7; }
    .art-overlay { opacity: 0; transition: opacity 0.2s; }
    .track-row:hover .art-overlay { opacity: 1; }
    input[type=range] { accent-color: #7c5cfc; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const formatTime = (s) => {
      if (!s || isNaN(s)) return "0:00";
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, "0")}`;
    };

    const MusicNote = () => (
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#4a4468" strokeWidth="1.2" strokeLinecap="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
    );

    const Bars = ({ n = 5, size = "lg" }) => {
      const widths = size === "sm" ? 2 : 4;
      const containerH = size === "sm" ? 14 : 28;
      return (
        <div style={{ display: "flex", alignItems: "flex-end", gap: size === "sm" ? 2 : 3, height: containerH }}>
          {Array.from({ length: n }).map((_, i) => (
            <div key={i} style={{
              width: widths, borderRadius: 2, background: "#a78bfa",
              animation: `bar${(i % 5) + 1} ${0.55 + i * 0.15}s ease-in-out infinite alternate`,
            }} />
          ))}
        </div>
      );
    };

    function MusicPlayer() {
      const [tracks, setTracks] = useState([]);
      const [currentIdx, setCurrentIdx] = useState(null);
      const [playing, setPlaying] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      const [volume, setVolume] = useState(1);
      const [repeat, setRepeat] = useState(false);
      const [shuffle, setShuffle] = useState(false);
      const [artEditIdx, setArtEditIdx] = useState(null);
      const [view, setView] = useState("player");
      const [toast, setToast] = useState(null);
      const [importedMeta, setImportedMeta] = useState(null);

      const audioRef = useRef(null);
      const fileInputRef = useRef(null);
      const artInputRef = useRef(null);
      const playlistInputRef = useRef(null);
      const mp3BatchInputRef = useRef(null);

      const currentTrack = currentIdx !== null ? tracks[currentIdx] : null;

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2500);
      };

      // Hilfsfunktion zur verlässlichen Erkennung von Audio-Dateien
      const isAudioFile = (file) => {
        return file.type.includes("audio") || /\.(mp3|wav|ogg|m4a|flac|aac|opus)$/i.test(file.name);
      };

      const playTrack = useCallback((idx, trackList) => {
        const list = trackList || tracks;
        const track = list[idx];
        if (!track || !audioRef.current) return;
        audioRef.current.src = track.url;
        audioRef.current.load();
        audioRef.current.play().catch(() => {});
        setCurrentIdx(idx);
        setPlaying(true);
      }, [tracks]);

      const goNext = useCallback(() => {
        if (!tracks.length) return;
        const next = shuffle
          ? Math.floor(Math.random() * tracks.length)
          : ((currentIdx ?? -1) + 1) % tracks.length;
        playTrack(next);
      }, [tracks, currentIdx, shuffle, playTrack]);

      const goPrev = useCallback(() => {
        if (!tracks.length) return;
        if (audioRef.current && audioRef.current.currentTime > 3) {
          audioRef.current.currentTime = 0;
          return;
        }
        const prev = ((currentIdx ?? 1) - 1 + tracks.length) % tracks.length;
        playTrack(prev);
      }, [tracks, currentIdx, playTrack]);

      const togglePlay = useCallback(() => {
        if (!audioRef.current || !currentTrack) return;
        if (playing) { audioRef.current.pause(); setPlaying(false); }
        else { audioRef.current.play().catch(() => {}); setPlaying(true); }
      }, [playing, currentTrack]);

      useEffect(() => {
        if (!("mediaSession" in navigator) || !currentTrack) return;
        navigator.mediaSession.metadata = new MediaMetadata({
          title: currentTrack.name,
          artist: "Meine Bibliothek",
          artwork: currentTrack.art ? [{ src: currentTrack.art, sizes: "512x512", type: "image/jpeg" }] : [],
        });
        navigator.mediaSession.setActionHandler("play", () => { audioRef.current?.play(); setPlaying(true); });
        navigator.mediaSession.setActionHandler("pause", () => { audioRef.current?.pause(); setPlaying(false); });
        navigator.mediaSession.setActionHandler("nexttrack", goNext);
        navigator.mediaSession.setActionHandler("previoustrack", goPrev);
        navigator.mediaSession.setActionHandler("seekto", (d) => {
          if (audioRef.current && d.seekTime != null) audioRef.current.currentTime = d.seekTime;
        });
      }, [currentTrack, goNext, goPrev]);

      useEffect(() => {
        const audio = audioRef.current;
        if (!audio) return;
        const onTime = () => setCurrentTime(audio.currentTime);
        const onDur = () => setDuration(audio.duration);
        const onEnded = () => { if (repeat) { audio.currentTime = 0; audio.play(); } else goNext(); };
        audio.addEventListener("timeupdate", onTime);
        audio.addEventListener("loadedmetadata", onDur);
        audio.addEventListener("ended", onEnded);
        return () => {
          audio.removeEventListener("timeupdate", onTime);
          audio.removeEventListener("loadedmetadata", onDur);
          audio.removeEventListener("ended", onEnded);
        };
      }, [goNext, repeat]);

      const handleFiles = (files) => {
        const audioFiles = Array.from(files).filter(isAudioFile);
        if (!audioFiles.length) {
          showToast("Keine Audio-Dateien erkannt!");
          return;
        }
        setTracks((prev) => {
          const newTracks = audioFiles.map((f) => ({
            name: f.name.replace(/\.[^/.]+$/, ""),
            url: URL.createObjectURL(f),
            art: null,
          }));
          const combined = [...prev, ...newTracks];
          if (prev.length === 0) setTimeout(() => playTrack(0, combined), 80);
          return combined;
        });
      };

      const handleArtFile = (e) => {
        const file = e.target.files?.[0];
        if (!file || artEditIdx === null) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          setTracks((prev) => prev.map((t, i) =>
            i === artEditIdx ? { ...t, art: ev.target.result } : t
          ));
        };
        reader.readAsDataURL(file);
        e.target.value = "";
        setArtEditIdx(null);
      };

      const openArtPicker = (idx, e) => {
        e.stopPropagation();
        setArtEditIdx(idx);
        setTimeout(() => artInputRef.current?.click(), 50);
      };

      const removeTrack = (idx, e) => {
        e.stopPropagation();
        setTracks((prev) => {
          URL.revokeObjectURL(prev[idx].url);
          const next = prev.filter((_, i) => i !== idx);
          if (idx === currentIdx) {
            if (audioRef.current) { audioRef.current.pause(); audioRef.current.src = ""; }
            setPlaying(false); setCurrentIdx(null); setCurrentTime(0); setDuration(0);
          } else if (currentIdx !== null && idx < currentIdx) {
            setCurrentIdx(currentIdx - 1);
          }
          return next;
        });
      };

      const exportPlaylist = () => {
        if (!tracks.length) return;
        const data = {
          version: 1,
          exportedAt: new Date().toISOString(),
          tracks: tracks.map((t) => ({ name: t.name, art: t.art })),
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = "playlist.json"; a.click();
        URL.revokeObjectURL(url);
        showToast("Playlist gespeichert");
      };

      const handlePlaylistImport = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (!data.tracks) throw new Error();
            setImportedMeta(data.tracks);
            showToast(`Playlist geladen – jetzt ${data.tracks.length} MP3s hinzufügen`);
          } catch { showToast("Ungültige Playlist-Datei"); }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      const handleBatchMP3s = (e) => {
        const files = Array.from(e.target.files).filter(isAudioFile);
        if (!files.length) {
          showToast("Keine Audio-Dateien erkannt!");
          return;
        }
        if (importedMeta) {
          const newTracks = importedMeta.map((meta) => {
            const match = files.find((f) => f.name.replace(/\.[^/.]+$/, "") === meta.name);
            if (!match) return null;
            return { name: meta.name, url: URL.createObjectURL(match), art: meta.art || null };
          }).filter(Boolean);
          const matchedNames = new Set(newTracks.map((t) => t.name));
          const unmatched = files
            .filter((f) => !matchedNames.has(f.name.replace(/\.[^/.]+$/, "")))
            .map((f) => ({ name: f.name.replace(/\.[^/.]+$/, ""), url: URL.createObjectURL(f), art: null }));
          const combined = [...newTracks, ...unmatched];
          setTracks(combined);
          setImportedMeta(null);
          if (combined.length > 0) setTimeout(() => playTrack(0, combined), 80);
          showToast(`${combined.length} Titel geladen`);
        } else {
          handleFiles(files);
        }
        e.target.value = "";
      };

      const seek = (e) => {
        if (!audioRef.current || !duration) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        audioRef.current.currentTime = ratio * duration;
      };

      const progress = duration ? (currentTime / duration) * 100 : 0;

      return (
        <div style={{ fontFamily: "'Inter', sans-serif", minHeight: "100vh", background: "#0a0a0f", color: "#e2e0f0", display: "flex", flexDirection: "column", alignItems: "center", padding: "24px 16px 48px" }}>
          <div style={{ width: "100%", maxWidth: 420 }}>

            <audio ref={audioRef} preload="auto" />
            <input ref={fileInputRef} type="file" accept="audio/*,.mp3,.wav,.m4a,.ogg,.flac" multiple style={{ display: "none" }} onChange={(e) => { handleFiles(e.target.files); e.target.value = ""; }} />
            <input ref={artInputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handleArtFile} />
            <input ref={playlistInputRef} type="file" accept=".json" style={{ display: "none" }} onChange={handlePlaylistImport} />
            <input ref={mp3BatchInputRef} type="file" accept="audio/*,.mp3,.wav,.m4a,.ogg,.flac" multiple style={{ display: "none" }} onChange={handleBatchMP3s} />

            {toast && (
              <div style={{ position: "fixed", bottom: 32, left: "50%", transform: "translateX(-50%)", background: "#7c5cfc", color: "#fff", padding: "10px 20px", borderRadius: 10, fontSize: 13, fontWeight: 500, zIndex: 100, boxShadow: "0 4px 20px rgba(0,0,0,0.4)", whiteSpace: "nowrap" }}>
                {toast}
              </div>
            )}

            {/* Header */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
              <div>
                <div style={{ fontSize: 11, letterSpacing: "0.18em", color: "#7c6faa", textTransform: "uppercase", marginBottom: 2 }}>Musik Player</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: "#f0eeff" }}>Bibliothek</div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => playlistInputRef.current?.click()} style={{ background: "#16112b", border: "1px solid #2a2245", borderRadius: 10, color: "#a78bfa", cursor: "pointer", padding: "8px 10px", fontSize: 13 }}>↑ Import</button>
                <button onClick={exportPlaylist} style={{ background: "#16112b", border: "1px solid #2a2245", borderRadius: 10, color: "#a78bfa", cursor: "pointer", padding: "8px 10px", fontSize: 13 }}>↓ Export</button>
              </div>
            </div>

            {/* Tabs */}
            <div style={{ display: "flex", gap: 4, marginBottom: 20, background: "#0e0c1f", borderRadius: 12, padding: 4 }}>
              {["player", "playlist"].map((v) => (
                <button key={v} onClick={() => setView(v)} style={{ flex: 1, padding: "9px 0", borderRadius: 9, border: "none", cursor: "pointer", fontSize: 13, fontWeight: 500, background: view === v ? "#7c5cfc" : "transparent", color: view === v ? "#fff" : "#5a5278", transition: "all 0.2s" }}>
                  {v === "player" ? "Player" : `Playlist${tracks.length ? ` (${tracks.length})` : ""}`}
                </button>
              ))}
            </div>

            {/* PLAYER VIEW */}
            {view === "player" && (
              <div style={{ background: "linear-gradient(145deg, #16112b, #1e1635)", borderRadius: 20, padding: "28px 24px 24px", border: "1px solid #2a2245" }}>
                {/* Album art */}
                <div style={{ width: "100%", aspectRatio: "1", borderRadius: 16, marginBottom: 24, overflow: "hidden", position: "relative", background: "#0f0a24", border: "1px solid #2a2245", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  {currentTrack?.art ? (
                    <img src={currentTrack.art} alt="cover" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                  ) : (
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", width: "100%", height: "100%", position: "relative" }}>
                      <div style={{ width: 140, height: 140, borderRadius: "50%", border: "1px solid #2e2060", position: "absolute" }} />
                      <div style={{ width: 90, height: 90, borderRadius: "50%", border: "1px solid #3a2875", position: "absolute" }} />
                      <div style={{ width: 52, height: 52, borderRadius: "50%", background: playing ? "#7c5cfc" : "#1e1645", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1, transition: "background 0.4s" }}>
                        <MusicNote />
                      </div>
                      {playing && <div style={{ position: "absolute", bottom: 20, zIndex: 2 }}><Bars /></div>}
                    </div>
                  )}
                  {currentTrack?.art && playing && (
                    <div style={{ position: "absolute", bottom: 16, left: "50%", transform: "translateX(-50%)" }}><Bars /></div>
                  )}
                  {currentTrack && (
                    <button onClick={(e) => openArtPicker(currentIdx, e)} style={{ position: "absolute", top: 10, right: 10, background: "rgba(0,0,0,0.6)", border: "1px solid #3a3060", borderRadius: 8, color: "#a78bfa", cursor: "pointer", padding: "5px 9px", fontSize: 11, fontWeight: 500 }}>
                      {currentTrack.art ? "Bild ändern" : "+ Bild"}
                    </button>
                  )}
                </div>

                {/* Track info */}
                <div style={{ marginBottom: 20, minHeight: 48 }}>
                  <div style={{ fontSize: 18, fontWeight: 700, color: "#f0eeff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", marginBottom: 4 }}>
                    {currentTrack ? currentTrack.name : "Kein Titel ausgewählt"}
                  </div>
                  <div style={{ fontSize: 13, color: "#7c6faa" }}>
                    {currentTrack ? `Titel ${(currentIdx ?? 0) + 1} von ${tracks.length}` : "Füge MP3-Dateien hinzu"}
                  </div>
                </div>

                {/* Seek */}
                <div onClick={seek} style={{ height: 4, background: "#2a2245", borderRadius: 2, cursor: "pointer", marginBottom: 8, position: "relative" }}>
                  <div style={{ width: `${progress}%`, height: "100%", background: "linear-gradient(90deg, #7c5cfc, #a78bfa)", borderRadius: 2, transition: "width 0.1s linear" }} />
                  {progress > 0 && <div style={{ position: "absolute", top: "50%", left: `${progress}%`, transform: "translate(-50%, -50%)", width: 13, height: 13, borderRadius: "50%", background: "#a78bfa" }} />}
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#5a5278", marginBottom: 24 }}>
                  <span>{formatTime(currentTime)}</span><span>{formatTime(duration)}</span>
                </div>

                {/* Controls */}
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <button onClick={() => setShuffle((s) => !s)} className="icon-btn" style={{ background: "none", border: "none", cursor: "pointer", color: shuffle ? "#a78bfa" : "#4a4468", padding: 8 }}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                      <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
                      <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
                    </svg>
                  </button>
                  <button onClick={goPrev} className="icon-btn" style={{ background: "none", border: "none", cursor: "pointer", color: "#c0b8e8", padding: 8 }}>
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
                      <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" strokeWidth="2" fill="none"/>
                    </svg>
                  </button>
                  <button onClick={togglePlay} style={{ width: 60, height: 60, borderRadius: "50%", background: "linear-gradient(135deg, #7c5cfc, #a855f7)", border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 24px rgba(124,92,252,0.5)", color: "#fff" }}>
                    {playing ? (
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    ) : (
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style={{ marginLeft: 2 }}><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    )}
                  </button>
                  <button onClick={goNext} className="icon-btn" style={{ background: "none", border: "none", cursor: "pointer", color: "#c0b8e8", padding: 8 }}>
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
                      <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" strokeWidth="2" fill="none"/>
                    </svg>
                  </button>
                  <button onClick={() => setRepeat((r) => !r)} className="icon-btn" style={{ background: "none", border: "none", cursor: "pointer", color: repeat ? "#a78bfa" : "#4a4468", padding: 8 }}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                      <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                      <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                    </svg>
                  </button>
                </div>

                {/* Volume */}
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 20 }}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5a5278" strokeWidth="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
                  <input type="range" min="0" max="1" step="0.01" value={volume} onChange={(e) => { const v = parseFloat(e.target.value); setVolume(v); if (audioRef.current) audioRef.current.volume = v; }} style={{ flex: 1, height: 4 }} />
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5a5278" strokeWidth="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                </div>
              </div>
            )}

            {/* PLAYLIST VIEW */}
            {view === "playlist" && (
              <div>
                <div
                  onDrop={(e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); }}
                  onDragOver={(e) => e.preventDefault()}
                  onClick={() => fileInputRef.current?.click()}
                  style={{ border: "1.5px dashed #2a2245", borderRadius: 14, padding: "18px", textAlign: "center", cursor: "pointer", marginBottom: 14, background: "#0e0c1f" }}
                  onMouseEnter={(e) => e.currentTarget.style.borderColor = "#7c5cfc"}
                  onMouseLeave={(e) => e.currentTarget.style.borderColor = "#2a2245"}
                >
                  <div style={{ fontSize: 20, marginBottom: 4 }}>＋</div>
                  <div style={{ fontSize: 13, color: "#7c6faa", fontWeight: 500 }}>MP3s hinzufügen</div>
                  <div style={{ fontSize: 11, color: "#4a4468", marginTop: 2 }}>Tippen oder ablegen · mehrere gleichzeitig möglich</div>
                </div>

                {importedMeta && (
                  <div style={{ background: "#1a1135", border: "1px solid #7c5cfc44", borderRadius: 12, padding: "14px 16px", marginBottom: 14, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: "#a78bfa", marginBottom: 2 }}>Playlist importiert</div>
                      <div style={{ fontSize: 11, color: "#7c6faa" }}>{importedMeta.length} Titel erwartet</div>
                    </div>
                    <button onClick={() => mp3BatchInputRef.current?.click()} style={{ background: "#7c5cfc", border: "none", borderRadius: 9, color: "#fff", cursor: "pointer", padding: "9px 14px", fontSize: 12, fontWeight: 600, flexShrink: 0 }}>MP3s laden</button>
                  </div>
                )}

                {tracks.length > 0 ? (
                  <div style={{ background: "#0e0c1f", borderRadius: 14, border: "1px solid #1e1a38", overflow: "hidden" }}>
                    <div style={{ padding: "11px 16px", fontSize: 11, letterSpacing: "0.12em", color: "#5a5278", textTransform: "uppercase", borderBottom: "1px solid #1e1a38" }}>
                      {tracks.length} Titel
                    </div>
                    <div style={{ maxHeight: 480, overflowY: "auto" }}>
                      {tracks.map((t, i) => (
                        <div key={i} className="track-row" onClick={() => { playTrack(i); setView("player"); }}
                          style={{ display: "flex", alignItems: "center", padding: "10px 14px", gap: 12, cursor: "pointer", background: i === currentIdx ? "#16112b" : "transparent", borderBottom: i < tracks.length - 1 ? "1px solid #151225" : "none", transition: "background 0.15s" }}>

                          <div style={{ width: 44, height: 44, borderRadius: 8, background: "#1a1635", flexShrink: 0, overflow: "hidden", position: "relative", display: "flex", alignItems: "center", justifyContent: "center", border: "1px solid #2a2245" }}>
                            {t.art ? <img src={t.art} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <MusicNote />}
                            <div className="art-overlay" onClick={(e) => openArtPicker(i, e)} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.65)", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
                              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </div>
                            {i === currentIdx && playing && (
                              <div style={{ position: "absolute", inset: 0, background: "rgba(10,8,20,0.6)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                                <Bars n={3} size="sm" />
                              </div>
                            )}
                          </div>

                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: 13, fontWeight: i === currentIdx ? 600 : 400, color: i === currentIdx ? "#c4b8f8" : "#a09ab8", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{t.name}</div>
                            <div style={{ fontSize: 11, color: "#4a4468", marginTop: 2 }}>{t.art ? "Cover vorhanden" : "Kein Cover"}</div>
                          </div>

                          <button onClick={(e) => removeTrack(i, e)} className="icon-btn" style={{ background: "none", border: "none", cursor: "pointer", color: "#3a3458", padding: "4px 6px", borderRadius: 6, fontSize: 17, flexShrink: 0 }}
                            onMouseEnter={(e) => e.currentTarget.style.color = "#f87171"}
                            onMouseLeave={(e) => e.currentTarget.style.color = "#3a3458"}>×</button>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : (
                  <div style={{ textAlign: "center", padding: "40px 20px", color: "#3a3458", fontSize: 13 }}>
                    Noch keine Titel · tippe oben um MP3s zu laden
                  </div>
                )}
              </div>
            )}

            <div style={{ textAlign: "center", marginTop: 20, fontSize: 11, color: "#2e2a48" }}>
              Lockscreen via Media Session API · Cover auf Sperrbildschirm
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<MusicPlayer />);
  </script>
</body>
</html>
