<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Minimal Music Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    /* OLED Schwarz spart auf Handys extrem Akku */
    html, body { 
      background: #000000; 
      min-height: 100vh; 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Schlichte, flache Card ohne Blur-Effekte */
    .flat-card {
      background: #121212;
      border: 1px solid #222222;
      border-radius: 20px;
    }
    
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333333; border-radius: 2px; }
    
    .track-row {
      transition: background 0.1s;
      user-select: none;
      -webkit-user-select: none;
    }
    .track-row:active { 
      background: #1a1a1a !important; 
    }
    
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:active {
      opacity: 0.6;
    }
    
    /* Flache Schieberegler ohne Animationen */
    input[type=range] { 
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      background: #333333;
    }
    
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const formatTime = (s) => {
      if (!s || isNaN(s)) return "0:00";
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, "0")}`;
    };

    const MusicNote = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" strokeWidth="1.5" strokeLinecap="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
    );

    function MusicPlayer() {
      const [tracks, setTracks] = useState([]);
      const [currentIdx, setCurrentIdx] = useState(null);
      const [playing, setPlaying] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      const [volume, setVolume] = useState(0.8);
      const [repeat, setRepeat] = useState(false);
      const [shuffle, setShuffle] = useState(false);
      const [view, setView] = useState("player");
      const [toast, setToast] = useState(null);
      const [isScrubbing, setIsScrubbing] = useState(false);

      const audioRef = useRef(null);
      const fileInputRef = useRef(null);
      const artInputRef = useRef(null);

      const currentTrack = currentIdx !== null ? tracks[currentIdx] : null;

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2000);
      };

      // Zuverlässiger m4a Support im Dateiwähler
      const isAudioFile = (file) => {
        return file.type.includes("audio") || 
               file.type === "video/mp4" || 
               file.type === "audio/mp4" ||
               file.type === "audio/x-m4a" ||
               /\.(mp3|wav|ogg|m4a|mp4|flac|aac|opus)$/i.test(file.name);
      };

      const playTrack = useCallback((idx, trackList) => {
        const list = trackList || tracks;
        const track = list[idx];
        if (!track || !audioRef.current) return;
        
        audioRef.current.src = track.url;
        audioRef.current.volume = volume;
        audioRef.current.load();
        audioRef.current.play().catch(() => {});
        setCurrentIdx(idx);
        setPlaying(true);
      }, [tracks, volume]);

      const goNext = useCallback(() => {
        if (!tracks.length) return;
        const next = shuffle
          ? Math.floor(Math.random() * tracks.length)
          : ((currentIdx ?? -1) + 1) % tracks.length;
        playTrack(next);
      }, [tracks, currentIdx, shuffle, playTrack]);

      const goPrev = useCallback(() => {
        if (!tracks.length) return;
        if (audioRef.current && audioRef.current.currentTime > 3) {
          audioRef.current.currentTime = 0;
          return;
        }
        const prev = ((currentIdx ?? 1) - 1 + tracks.length) % tracks.length;
        playTrack(prev);
      }, [tracks, currentIdx, playTrack]);

      const togglePlay = useCallback(() => {
        if (!audioRef.current || !currentTrack) return;
        if (playing) { 
          audioRef.current.pause(); 
          setPlaying(false); 
        } else { 
          audioRef.current.play().catch(() => {}); 
          setPlaying(true); 
        }
      }, [playing, currentTrack]);

      // Simple Sortier-Funktion (CPU-schonender Ersatz für Drag & Drop)
      const moveTrack = (index, direction) => {
        if (index + direction < 0 || index + direction >= tracks.length) return;
        const updated = [...tracks];
        const temp = updated[index];
        updated[index] = updated[index + direction];
        updated[index + direction] = temp;

        if (currentIdx === index) {
          setCurrentIdx(index + direction);
        } else if (currentIdx === index + direction) {
          setCurrentIdx(index);
        }
        setTracks(updated);
      };

      // Mediasession-API für nativen Sperrbildschirm-Support
      useEffect(() => {
        if (!("mediaSession" in navigator) || !currentTrack) return;
        navigator.mediaSession.metadata = new MediaMetadata({
          title: currentTrack.name,
          artist: "Offline Player",
          artwork: currentTrack.art ? [{ src: currentTrack.art, sizes: "300x300", type: "image/jpeg" }] : [],
        });
        navigator.mediaSession.setActionHandler("play", () => { audioRef.current?.play(); setPlaying(true); });
        navigator.mediaSession.setActionHandler("pause", () => { audioRef.current?.pause(); setPlaying(false); });
        navigator.mediaSession.setActionHandler("nexttrack", goNext);
        navigator.mediaSession.setActionHandler("previoustrack", goPrev);
      }, [currentTrack, goNext, goPrev]);

      useEffect(() => {
        const audio = audioRef.current;
        if (!audio) return;
        const onTime = () => {
          if (!isScrubbing) {
            setCurrentTime(audio.currentTime);
          }
        };
        const onDur = () => setDuration(audio.duration);
        const onEnded = () => { if (repeat) { audio.currentTime = 0; audio.play(); } else goNext(); };
        
        audio.addEventListener("timeupdate", onTime);
        audio.addEventListener("loadedmetadata", onDur);
        audio.addEventListener("ended", onEnded);
        return () => {
          audio.removeEventListener("timeupdate", onTime);
          audio.removeEventListener("loadedmetadata", onDur);
          audio.removeEventListener("ended", onEnded);
        };
      }, [goNext, repeat, isScrubbing]);

      const handleFiles = (files) => {
        const audioFiles = Array.from(files).filter(isAudioFile);
        if (!audioFiles.length) {
          showToast("Keine Audio-Dateien erkannt!");
          return;
        }
        setTracks((prev) => {
          const newTracks = audioFiles.map((f, i) => ({
            id: `track-${Date.now()}-${i}-${Math.random()}`,
            name: f.name.replace(/\.[^/.]+$/, ""),
            url: URL.createObjectURL(f),
            art: null,
          }));
          return [...prev, ...newTracks];
        });
        showToast(`${audioFiles.length} Titel geladen`);
      };

      const handleArtFile = (e) => {
        const file = e.target.files?.[0];
        if (!file || currentIdx === null) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          setTracks((prev) => prev.map((t, i) =>
            i === currentIdx ? { ...t, art: ev.target.result } : t
          ));
        };
        reader.readAsDataURL(file);
        e.target.value = "";
      };

      const removeTrack = (idx, e) => {
        e.stopPropagation();
        setTracks((prev) => {
          URL.revokeObjectURL(prev[idx].url);
          const next = prev.filter((_, i) => i !== idx);
          if (idx === currentIdx) {
            if (audioRef.current) { audioRef.current.pause(); audioRef.current.src = ""; }
            setPlaying(false); setCurrentIdx(null); setCurrentTime(0); setDuration(0);
          } else if (currentIdx !== null && idx < currentIdx) {
            setCurrentIdx(currentIdx - 1);
          }
          return next;
        });
      };

      const progress = duration ? (currentTime / duration) * 100 : 0;

      return (
        <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", padding: "24px 16px 60px" }}>
          <div style={{ width: "100%", maxWidth: 390 }}>

            <audio ref={audioRef} preload="auto" playsInline />
            <input ref={fileInputRef} type="file" accept="audio/*, .m4a, .mp4, audio/mp4, audio/x-m4a" multiple style={{ display: "none" }} onChange={(e) => { handleFiles(e.target.files); e.target.value = ""; }} />
            <input ref={artInputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handleArtFile} />

            {toast && (
              <div style={{ position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)", background: "#1a1a1a", border: "1px solid #333333", color: "#fff", padding: "10px 20px", borderRadius: 12, fontSize: 13, zIndex: 100 }}>
                {toast}
              </div>
            )}

            {/* Header */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
              <h1 style={{ fontSize: 24, fontWeight: 800 }}>Mediathek</h1>
              <button onClick={() => fileInputRef.current?.click()} style={{ background: "#fc3c44", border: "none", borderRadius: 12, color: "#fff", padding: "6px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                + Musik laden
              </button>
            </div>

            {/* Simple Segmented Tabs */}
            <div style={{ display: "flex", background: "#111111", borderRadius: 10, padding: 3, marginBottom: 20, border: "1px solid #222222" }}>
              {["player", "playlist"].map((v) => (
                <button key={v} onClick={() => setView(v)} style={{ flex: 1, padding: "6px 0", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 600, background: view === v ? "#222222" : "transparent", color: view === v ? "#ffffff" : "#666666" }}>
                  {v === "player" ? "Jetzt läuft" : `Titelliste (${tracks.length})`}
                </button>
              ))}
            </div>

            {/* PLAYER VIEW */}
            {view === "player" && (
              <div className="flat-card" style={{ padding: "24px" }}>
                
                {/* Minimal Cover Art (Kein Animations-Markup) */}
                <div style={{ width: "100%", aspectRatio: "1", borderRadius: 12, marginBottom: 24, overflow: "hidden", background: "#181818", display: "flex", alignItems: "center", justifyContent: "center", border: "1px solid #222222", position: "relative" }}>
                  {currentTrack?.art ? (
                    <img src={currentTrack.art} alt="cover" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                  ) : (
                    <MusicNote />
                  )}
                  {currentTrack && (
                    <button onClick={() => artInputRef.current?.click()} style={{ position: "absolute", bottom: 12, right: 12, background: "rgba(0,0,0,0.7)", border: "1px solid #333", borderRadius: 8, color: "#fff", padding: "4px 8px", fontSize: 11, cursor: "pointer" }}>
                      Cover ändern
                    </button>
                  )}
                </div>

                {/* Track Info */}
                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 18, fontWeight: 800, color: "#ffffff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {currentTrack ? currentTrack.name : "Kein Titel geladen"}
                  </div>
                  <div style={{ fontSize: 13, color: "#666666", marginTop: 4 }}>
                    {currentTrack ? `Titel ${(currentIdx ?? 0) + 1} von ${tracks.length}` : "Füge Musik im Tab 'Titelliste' hinzu"}
                  </div>
                </div>

                {/* Slider (Optimiert für schnelles Rendering) */}
                <div style={{ display: "flex", flexDirection: "column", marginBottom: 24 }}>
                  <input 
                    type="range"
                    min="0"
                    max={duration || 100}
                    value={currentTime}
                    onMouseDown={() => setIsScrubbing(true)}
                    onMouseUp={() => setIsScrubbing(false)}
                    onTouchStart={() => setIsScrubbing(true)}
                    onTouchEnd={() => setIsScrubbing(false)}
                    onChange={(e) => {
                      const newTime = parseFloat(e.target.value);
                      setCurrentTime(newTime);
                      if (audioRef.current) {
                        audioRef.current.currentTime = newTime;
                      }
                    }}
                    style={{
                      width: "100%",
                      marginBottom: 8,
                      background: `linear-gradient(to right, #fc3c44 ${progress}%, #222 ${progress}%)`
                    }}
                  />
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#555" }}>
                    <span>{formatTime(currentTime)}</span>
                    <span>-{formatTime(duration - currentTime)}</span>
                  </div>
                </div>

                {/* Steuerungselemente */}
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
                  <button onClick={() => setShuffle((s) => !s)} className="icon-btn" style={{ color: shuffle ? "#fc3c44" : "#444" }}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
                  </button>
                  
                  <button onClick={goPrev} className="icon-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" strokeWidth="2.5"/></svg>
                  </button>
                  
                  <button onClick={togglePlay} className="icon-btn" style={{ width: 56, height: 56, borderRadius: "50%", background: "#ffffff", color: "#000000" }}>
                    {playing ? (
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/></svg>
                    ) : (
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style={{ marginLeft: 2 }}><polygon points="6 3 20 12 6 21 6 3"/></svg>
                    )}
                  </button>
                  
                  <button onClick={goNext} className="icon-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" strokeWidth="2.5"/></svg>
                  </button>
                  
                  <button onClick={() => setRepeat((r) => !r)} className="icon-btn" style={{ color: repeat ? "#fc3c44" : "#444" }}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                  </button>
                </div>

                {/* Lautstärkeregler */}
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#444" strokeWidth="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
                  <input 
                    type="range" 
                    min="0" 
                    max="1" 
                    step="0.05" 
                    value={volume} 
                    onChange={(e) => handleVolumeChange(parseFloat(e.target.value))} 
                    style={{ 
                      flex: 1, 
                      background: `linear-gradient(to right, #fc3c44 ${volume * 100}%, #222 ${volume * 100}%)` 
                    }} 
                  />
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#444" strokeWidth="2.5"><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                </div>
              </div>
            )}

            {/* PLAYLIST VIEW */}
            {view === "playlist" && (
              <div>
                {tracks.length > 0 ? (
                  <div className="flat-card" style={{ overflow: "hidden" }}>
                    <div style={{ maxHeight: 420, overflowY: "auto" }}>
                      {tracks.map((t, i) => (
                        <div 
                          key={t.id} 
                          onClick={() => { playTrack(i); setView("player"); }}
                          style={{ display: "flex", alignItems: "center", padding: "10px 14px", gap: 12, background: i === currentIdx ? "#1a1a1a" : "transparent", borderBottom: "1px solid #1a1a1a" }}>

                          {/* Cover Thumbnail */}
                          <div style={{ width: 36, height: 36, borderRadius: 6, background: "#181818", flexShrink: 0, overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center", border: "1px solid #222" }}>
                            {t.art ? <img src={t.art} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <div style={{ transform: "scale(0.7)" }}><MusicNote /></div>}
                          </div>

                          {/* Titel */}
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: 13, fontWeight: i === currentIdx ? "800" : "400", color: i === currentIdx ? "#fc3c44" : "#ffffff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                              {t.name}
                            </div>
                          </div>

                          {/* Manuelles Sortieren per Klick (100% akkuschonender als Drag & Drop!) */}
                          <div style={{ display: "flex", alignItems: "center", gap: 4 }} onClick={(e) => e.stopPropagation()}>
                            <button onClick={() => moveTrack(i, -1)} style={{ background: "#222", border: "none", color: "#666", width: 22, height: 22, borderRadius: 4, cursor: "pointer", fontSize: 10, display: "flex", alignItems: "center", justifyContent: "center" }} disabled={i === 0}>▲</button>
                            <button onClick={() => moveTrack(i, 1)} style={{ background: "#222", border: "none", color: "#666", width: 22, height: 22, borderRadius: 4, cursor: "pointer", fontSize: 10, display: "flex", alignItems: "center", justifyContent: "center" }} disabled={i === tracks.length - 1}>▼</button>
                            <button onClick={(e) => removeTrack(i, e)} style={{ background: "none", border: "none", color: "#666", fontSize: 18, cursor: "pointer", width: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center" }}>×</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : (
                  <div style={{ textShadow: "none", textAlign: "center", padding: "40px", color: "#444", fontSize: 12 }}>
                    Keine Lieder geladen. Klicke oben auf "+ Musik laden".
                  </div>
                )}
              </div>
            )}

            <div style={{ textAlign: "center", marginTop: 24, fontSize: 10, color: "#333", fontWeight: "600" }}>
              Cold-Engine Player v3.0 (Zero-Animation Edition)
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<MusicPlayer />);
  </script>
</body>
</html>
