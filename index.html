<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Music Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    html, body { 
      background: #000000; 
      min-height: 100%; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
    }
    
    @keyframes bar1 { from { height: 4px; } to { height: 22px; } }
    @keyframes bar2 { from { height: 8px; } to { height: 16px; } }
    @keyframes bar3 { from { height: 6px; } to { height: 24px; } }
    @keyframes bar4 { from { height: 10px; } to { height: 14px; } }
    @keyframes bar5 { from { height: 5px; } to { height: 20px; } }
    
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3a3a3c; border-radius: 2px; }
    
    .track-row {
      transition: background 0.2s, transform 0.1s;
    }
    .track-row:hover { 
      background: rgba(255, 255, 255, 0.05) !important; 
    }
    .track-row.dragging {
      opacity: 0.5;
      background: rgba(255, 255, 255, 0.1) !important;
      transform: scale(0.98);
    }
    
    .icon-btn {
      transition: transform 0.1s, opacity 0.2s;
    }
    .icon-btn:hover { 
      opacity: 0.8; 
    }
    .icon-btn:active {
      transform: scale(0.92);
    }
    
    .art-overlay { 
      opacity: 0; 
      transition: opacity 0.2s; 
    }
    .track-row:hover .art-overlay { 
      opacity: 1; 
    }
    
    input[type=range] { 
      accent-color: #fc3c44; 
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const formatTime = (s) => {
      if (!s || isNaN(s)) return "0:00";
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, "0")}`;
    };

    const MusicNote = () => (
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" strokeWidth="1.5" strokeLinecap="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
    );

    const DragIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255, 255, 255, 0.3)" strokeWidth="2" strokeLinecap="round">
        <line x1="4" y1="9" x2="20" y2="9" />
        <line x1="4" y1="15" x2="20" y2="15" />
      </svg>
    );

    const Bars = ({ n = 5, size = "lg" }) => {
      const widths = size === "sm" ? 2 : 3;
      const containerH = size === "sm" ? 12 : 24;
      return (
        <div style={{ display: "flex", alignItems: "flex-end", gap: size === "sm" ? 2 : 3, height: containerH }}>
          {Array.from({ length: n }).map((_, i) => (
            <div key={i} style={{
              width: widths, borderRadius: 1, background: "#fc3c44",
              animation: `bar${(i % 5) + 1} ${0.55 + i * 0.15}s ease-in-out infinite alternate`,
            }} />
          ))}
        </div>
      );
    };

    function MusicPlayer() {
      const [tracks, setTracks] = useState([]);
      const [currentIdx, setCurrentIdx] = useState(null);
      const [playing, setPlaying] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      const [volume, setVolume] = useState(0.8);
      const [repeat, setRepeat] = useState(false);
      const [shuffle, setShuffle] = useState(false);
      const [artEditIdx, setArtEditIdx] = useState(null);
      const [view, setView] = useState("player");
      const [toast, setToast] = useState(null);
      const [importedMeta, setImportedMeta] = useState(null);
      
      // Drag & Drop State
      const [draggedIdx, setDraggedIdx] = useState(null);

      const audioRef = useRef(null);
      const fileInputRef = useRef(null);
      const artInputRef = useRef(null);
      const playlistInputRef = useRef(null);
      const mp3BatchInputRef = useRef(null);

      const currentTrack = currentIdx !== null ? tracks[currentIdx] : null;

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2500);
      };

      const isAudioFile = (file) => {
        return file.type.includes("audio") || /\.(mp3|wav|ogg|m4a|flac|aac|opus)$/i.test(file.name);
      };

      const playTrack = useCallback((idx, trackList) => {
        const list = trackList || tracks;
        const track = list[idx];
        if (!track || !audioRef.current) return;
        audioRef.current.src = track.url;
        audioRef.current.load();
        audioRef.current.play().catch(() => {});
        setCurrentIdx(idx);
        setPlaying(true);
      }, [tracks]);

      const goNext = useCallback(() => {
        if (!tracks.length) return;
        const next = shuffle
          ? Math.floor(Math.random() * tracks.length)
          : ((currentIdx ?? -1) + 1) % tracks.length;
        playTrack(next);
      }, [tracks, currentIdx, shuffle, playTrack]);

      const goPrev = useCallback(() => {
        if (!tracks.length) return;
        if (audioRef.current && audioRef.current.currentTime > 3) {
          audioRef.current.currentTime = 0;
          return;
        }
        const prev = ((currentIdx ?? 1) - 1 + tracks.length) % tracks.length;
        playTrack(prev);
      }, [tracks, currentIdx, playTrack]);

      const togglePlay = useCallback(() => {
        if (!audioRef.current || !currentTrack) return;
        if (playing) { audioRef.current.pause(); setPlaying(false); }
        else { audioRef.current.play().catch(() => {}); setPlaying(true); }
      }, [playing, currentTrack]);

      // DRAG & DROP HANDLERS
      const handleDragStart = (e, index) => {
        setDraggedIdx(index);
        e.dataTransfer.effectAllowed = "move";
      };

      const handleDragOver = (e, overIndex) => {
        e.preventDefault();
        if (draggedIdx === null || draggedIdx === overIndex) return;

        const updatedTracks = [...tracks];
        const draggedTrack = updatedTracks[draggedIdx];
        
        // Verschiebe Song im Array
        updatedTracks.splice(draggedIdx, 1);
        updatedTracks.splice(overIndex, 0, draggedTrack);

        // Halte den aktuell spielenden Song-Index synchron
        if (currentIdx !== null) {
          if (currentIdx === draggedIdx) {
            setCurrentIdx(overIndex);
          } else if (draggedIdx < currentIdx && overIndex >= currentIdx) {
            setCurrentIdx(currentIdx - 1);
          } else if (draggedIdx > currentIdx && overIndex <= currentIdx) {
            setCurrentIdx(currentIdx + 1);
          }
        }

        setDraggedIdx(overIndex);
        setTracks(updatedTracks);
      };

      const handleDragEnd = () => {
        setDraggedIdx(null);
      };

      useEffect(() => {
        if (!("mediaSession" in navigator) || !currentTrack) return;
        navigator.mediaSession.metadata = new MediaMetadata({
          title: currentTrack.name,
          artist: "Meine Mediathek",
          artwork: currentTrack.art ? [{ src: currentTrack.art, sizes: "512x512", type: "image/jpeg" }] : [],
        });
        navigator.mediaSession.setActionHandler("play", () => { audioRef.current?.play(); setPlaying(true); });
        navigator.mediaSession.setActionHandler("pause", () => { audioRef.current?.pause(); setPlaying(false); });
        navigator.mediaSession.setActionHandler("nexttrack", goNext);
        navigator.mediaSession.setActionHandler("previoustrack", goPrev);
        navigator.mediaSession.setActionHandler("seekto", (d) => {
          if (audioRef.current && d.seekTime != null) audioRef.current.currentTime = d.seekTime;
        });
      }, [currentTrack, goNext, goPrev]);

      useEffect(() => {
        const audio = audioRef.current;
        if (!audio) return;
        const onTime = () => setCurrentTime(audio.currentTime);
        const onDur = () => setDuration(audio.duration);
        const onEnded = () => { if (repeat) { audio.currentTime = 0; audio.play(); } else goNext(); };
        audio.addEventListener("timeupdate", onTime);
        audio.addEventListener("loadedmetadata", onDur);
        audio.addEventListener("ended", onEnded);
        return () => {
          audio.removeEventListener("timeupdate", onTime);
          audio.removeEventListener("loadedmetadata", onDur);
          audio.removeEventListener("ended", onEnded);
        };
      }, [goNext, repeat]);

      const handleFiles = (files) => {
        const audioFiles = Array.from(files).filter(isAudioFile);
        if (!audioFiles.length) {
          showToast("Keine Audio-Dateien erkannt!");
          return;
        }
        setTracks((prev) => {
          const newTracks = audioFiles.map((f, i) => ({
            id: `track-${Date.now()}-${i}-${Math.random()}`, // Eindeutige ID für flüssigen Reorder
            name: f.name.replace(/\.[^/.]+$/, ""),
            url: URL.createObjectURL(f),
            art: null,
          }));
          const combined = [...prev, ...newTracks];
          if (prev.length === 0) setTimeout(() => playTrack(0, combined), 80);
          return combined;
        });
      };

      const handleArtFile = (e) => {
        const file = e.target.files?.[0];
        if (!file || artEditIdx === null) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          setTracks((prev) => prev.map((t, i) =>
            i === artEditIdx ? { ...t, art: ev.target.result } : t
          ));
        };
        reader.readAsDataURL(file);
        e.target.value = "";
        setArtEditIdx(null);
      };

      const openArtPicker = (idx, e) => {
        e.stopPropagation();
        setArtEditIdx(idx);
        setTimeout(() => artInputRef.current?.click(), 50);
      };

      const removeTrack = (idx, e) => {
        e.stopPropagation();
        setTracks((prev) => {
          URL.revokeObjectURL(prev[idx].url);
          const next = prev.filter((_, i) => i !== idx);
          if (idx === currentIdx) {
            if (audioRef.current) { audioRef.current.pause(); audioRef.current.src = ""; }
            setPlaying(false); setCurrentIdx(null); setCurrentTime(0); setDuration(0);
          } else if (currentIdx !== null && idx < currentIdx) {
            setCurrentIdx(currentIdx - 1);
          }
          return next;
        });
      };

      const exportPlaylist = () => {
        if (!tracks.length) return;
        const data = {
          version: 1,
          exportedAt: new Date().toISOString(),
          tracks: tracks.map((t) => ({ name: t.name, art: t.art })),
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = "playlist.json"; a.click();
        URL.revokeObjectURL(url);
        showToast("Playlist gesichert");
      };

      const handlePlaylistImport = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (!data.tracks) throw new Error();
            setImportedMeta(data.tracks);
            showToast(`Playlist geladen · ${data.tracks.length} MP3s fehlen noch`);
          } catch { showToast("Ungültige Playlist-Datei"); }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      const handleBatchMP3s = (e) => {
        const files = Array.from(e.target.files).filter(isAudioFile);
        if (!files.length) {
          showToast("Keine Audio-Dateien erkannt!");
          return;
        }
        if (importedMeta) {
          const newTracks = importedMeta.map((meta, i) => {
            const match = files.find((f) => f.name.replace(/\.[^/.]+$/, "") === meta.name);
            if (!match) return null;
            return { 
              id: `track-${Date.now()}-${i}-${Math.random()}`,
              name: meta.name, 
              url: URL.createObjectURL(match), 
              art: meta.art || null 
            };
          }).filter(Boolean);
          const matchedNames = new Set(newTracks.map((t) => t.name));
          const unmatched = files
            .filter((f) => !matchedNames.has(f.name.replace(/\.[^/.]+$/, "")))
            .map((f, i) => ({ 
              id: `track-unmatched-${Date.now()}-${i}`,
              name: f.name.replace(/\.[^/.]+$/, ""), 
              url: URL.createObjectURL(f), 
              art: null 
            }));
          const combined = [...newTracks, ...unmatched];
          setTracks(combined);
          setImportedMeta(null);
          if (combined.length > 0) setTimeout(() => playTrack(0, combined), 80);
          showToast(`${combined.length} Titel geladen`);
        } else {
          handleFiles(files);
        }
        e.target.value = "";
      };

      const seek = (e) => {
        if (!audioRef.current || !duration) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        audioRef.current.currentTime = ratio * duration;
      };

      const progress = duration ? (currentTime / duration) * 100 : 0;

      return (
        <div style={{ minHeight: "100vh", background: "#000000", color: "#ffffff", display: "flex", flexDirection: "column", alignItems: "center", padding: "40px 16px 60px" }}>
          <div style={{ width: "100%", maxWidth: 410 }}>

            <audio ref={audioRef} preload="auto" />
            <input ref={fileInputRef} type="file" accept="audio/*,.mp3,.wav,.m4a,.ogg,.flac" multiple style={{ display: "none" }} onChange={(e) => { handleFiles(e.target.files); e.target.value = ""; }} />
            <input ref={artInputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handleArtFile} />
            <input ref={playlistInputRef} type="file" accept=".json" style={{ display: "none" }} onChange={handlePlaylistImport} />
            <input ref={mp3BatchInputRef} type="file" accept="audio/*,.mp3,.wav,.m4a,.ogg,.flac" multiple style={{ display: "none" }} onChange={handleBatchMP3s} />

            {toast && (
              <div style={{ position: "fixed", top: 24, left: "50%", transform: "translateX(-50%)", background: "rgba(30, 30, 30, 0.9)", backdropFilter: "blur(20px)", color: "#fff", padding: "12px 24px", borderRadius: 24, fontSize: 14, fontWeight: 600, zIndex: 100, boxShadow: "0 8px 30px rgba(0,0,0,0.5)", border: "1px solid rgba(255,255,255,0.08)", whiteSpace: "nowrap" }}>
                {toast}
              </div>
            )}

            {/* Apple Music Header */}
            <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: 28, padding: "0 8px" }}>
              <div>
                <div style={{ fontSize: 32, fontWeight: 800, color: "#ffffff", letterSpacing: "-0.5px" }}>Mediathek</div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => playlistInputRef.current?.click()} style={{ background: "rgba(255,255,255,0.08)", border: "none", borderRadius: 20, color: "#fc3c44", cursor: "pointer", padding: "8px 16px", fontSize: 13, fontWeight: 600, transition: "background 0.2s" }} onMouseEnter={(e)=>e.target.style.background="rgba(255,255,255,0.12)"} onMouseLeave={(e)=>e.target.style.background="rgba(255,255,255,0.08)"}>↑ Import</button>
                <button onClick={exportPlaylist} style={{ background: "rgba(255,255,255,0.08)", border: "none", borderRadius: 20, color: "#fc3c44", cursor: "pointer", padding: "8px 16px", fontSize: 13, fontWeight: 600, transition: "background 0.2s" }} onMouseEnter={(e)=>e.target.style.background="rgba(255,255,255,0.12)"} onMouseLeave={(e)=>e.target.style.background="rgba(255,255,255,0.08)"}>↓ Export</button>
              </div>
            </div>

            {/* iOS Segmented Control Tab Switcher */}
            <div style={{ display: "flex", background: "rgba(116, 116, 128, 0.18)", borderRadius: 10, padding: 2, marginBottom: 24 }}>
              {["player", "playlist"].map((v) => (
                <button key={v} onClick={() => setView(v)} style={{ flex: 1, padding: "7px 0", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 13, fontWeight: 600, background: view === v ? "rgba(255,255,255,0.12)" : "transparent", color: "#ffffff", transition: "all 0.15s ease", boxShadow: view === v ? "0 1px 3px rgba(0,0,0,0.3)" : "none" }}>
                  {v === "player" ? "Jetzt läuft" : `Titelliste${tracks.length ? ` (${tracks.length})` : ""}`}
                </button>
              ))}
            </div>

            {/* PLAYER VIEW */}
            {view === "player" && (
              <div style={{ background: "rgba(28, 28, 30, 0.6)", backdropFilter: "blur(30px)", borderRadius: 32, padding: "32px 24px", border: "1px solid rgba(255,255,255,0.06)", boxShadow: "0 20px 40px rgba(0,0,0,0.4)" }}>
                
                {/* Artwork */}
                <div style={{ width: "100%", aspectRatio: "1", borderRadius: 24, marginBottom: 32, overflow: "hidden", position: "relative", background: "#1c1c1e", boxShadow: "0 12px 36px rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  {currentTrack?.art ? (
                    <img src={currentTrack.art} alt="cover" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                  ) : (
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", width: "100%", height: "100%", position: "relative" }}>
                      <div style={{ width: 150, height: 150, borderRadius: "50%", border: "1px solid rgba(255,255,255,0.05)", position: "absolute" }} />
                      <div style={{ width: 100, height: 100, borderRadius: "50%", border: "1px solid rgba(255,255,255,0.08)", position: "absolute" }} />
                      <div style={{ width: 56, height: 56, borderRadius: "50%", background: playing ? "#fc3c44" : "#2c2c2e", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1, transition: "background 0.3s" }}>
                        <MusicNote />
                      </div>
                      {playing && <div style={{ position: "absolute", bottom: 24, zIndex: 2 }}><Bars /></div>}
                    </div>
                  )}
                  {currentTrack?.art && playing && (
                    <div style={{ position: "absolute", bottom: 20, left: "50%", transform: "translateX(-50%)" }}><Bars /></div>
                  )}
                  {currentTrack && (
                    <button onClick={(e) => openArtPicker(currentIdx, e)} style={{ position: "absolute", bottom: 12, right: 12, background: "rgba(0,0,0,0.6)", backdropFilter: "blur(10px)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 12, color: "#ffffff", cursor: "pointer", padding: "6px 12px", fontSize: 11, fontWeight: 600 }}>
                      {currentTrack.art ? "Ändern" : "+ Cover"}
                    </button>
                  )}
                </div>

                {/* Track Info */}
                <div style={{ marginBottom: 28, minHeight: 52, padding: "0 4px" }}>
                  <div style={{ fontSize: 22, fontWeight: 700, color: "#ffffff", letterSpacing: "-0.5px", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", marginBottom: 4 }}>
                    {currentTrack ? currentTrack.name : "Nicht geladen"}
                  </div>
                  <div style={{ fontSize: 15, fontWeight: 500, color: "#8e8e93" }}>
                    {currentTrack ? `Song ${(currentIdx ?? 0) + 1} von ${tracks.length}` : "Füge Musik in der Liste hinzu"}
                  </div>
                </div>

                {/* Apple Music Progress bar */}
                <div onClick={seek} style={{ height: 4, background: "rgba(255,255,255,0.15)", borderRadius: 2, cursor: "pointer", marginBottom: 10, position: "relative" }}>
                  <div style={{ width: `${progress}%`, height: "100%", background: "#ffffff", borderRadius: 2 }} />
                  {progress > 0 && <div style={{ position: "absolute", top: "50%", left: `${progress}%`, transform: "translate(-50%, -50%)", width: 8, height: 8, borderRadius: "50%", background: "#ffffff" }} />}
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, fontWeight: 500, color: "#8e8e93", marginBottom: 32, padding: "0 2px" }}>
                  <span>{formatTime(currentTime)}</span><span>-{formatTime(duration - currentTime)}</span>
                </div>

                {/* Controls */}
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-around", marginBottom: 28 }}>
                  <button onClick={() => setShuffle((s) => !s)} className="icon-btn" style={{ background: "none", border: "none", cursor: "pointer", color: shuffle ? "#fc3c44" : "#8e8e93" }}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                      <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
                      <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
                    </svg>
                  </button>
                  <button onClick={goPrev} className="icon-btn" style={{ background: "none", border: "none", cursor: "pointer", color: "#ffffff" }}>
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                      <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" strokeWidth="2.5" fill="none"/>
                    </svg>
                  </button>
                  <button onClick={togglePlay} className="icon-btn" style={{ width: 68, height: 68, borderRadius: "50%", background: "#ffffff", border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: "#000000", boxShadow: "0 4px 12px rgba(255,255,255,0.15)" }}>
                    {playing ? (
                      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/></svg>
                    ) : (
                      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style={{ marginLeft: 3 }}><polygon points="6 3 20 12 6 21 6 3" strokeLinejoin="round" strokeLinecap="round"/></svg>
                    )}
                  </button>
                  <button onClick={goNext} className="icon-btn" style={{ background: "none", border: "none", cursor: "pointer", color: "#ffffff" }}>
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                      <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" strokeWidth="2.5" fill="none"/>
                    </svg>
                  </button>
                  <button onClick={() => setRepeat((r) => !r)} className="icon-btn" style={{ background: "none", border: "none", cursor: "pointer", color: repeat ? "#fc3c44" : "#8e8e93" }}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                      <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                      <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                    </svg>
                  </button>
                </div>

                {/* Volume slider */}
                <div style={{ display: "flex", alignItems: "center", gap: 14, padding: "0 8px" }}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" strokeWidth="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
                  <input type="range" min="0" max="1" step="0.01" value={volume} onChange={(e) => { const v = parseFloat(e.target.value); setVolume(v); if (audioRef.current) audioRef.current.volume = v; }} style={{ flex: 1, height: 3 }} />
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" strokeWidth="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                </div>
              </div>
            )}

            {/* PLAYLIST VIEW */}
            {view === "playlist" && (
              <div>
                {/* Drag Drop Area */}
                <div
                  onDrop={(e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); }}
                  onDragOver={(e) => e.preventDefault()}
                  onClick={() => fileInputRef.current?.click()}
                  style={{ border: "1.5px dashed rgba(255,255,255,0.15)", borderRadius: 16, padding: "24px", textAlign: "center", cursor: "pointer", marginBottom: 20, background: "rgba(255, 255, 255, 0.03)", transition: "border 0.2s" }}
                  onMouseEnter={(e) => e.currentTarget.style.borderColor = "#fc3c44"}
                  onMouseLeave={(e) => e.currentTarget.style.borderColor = "rgba(255,255,255,0.15)"}
                >
                  <div style={{ fontSize: 24, marginBottom: 6, color: "#fc3c44" }}>＋</div>
                  <div style={{ fontSize: 14, fontWeight: 600, color: "#ffffff" }}>Musik hinzufügen</div>
                  <div style={{ fontSize: 12, color: "#8e8e93", marginTop: 4 }}>Drag-and-Drop oder Klicken · MP3, WAV, M4A</div>
                </div>

                {importedMeta && (
                  <div style={{ background: "rgba(252, 60, 68, 0.1)", border: "1px solid rgba(252, 60, 68, 0.2)", borderRadius: 16, padding: "16px", marginBottom: 20, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 700, color: "#ffffff", marginBottom: 2 }}>Playlist importiert</div>
                      <div style={{ fontSize: 12, color: "#8e8e93" }}>{importedMeta.length} Lieder bereit zum Abgleich</div>
                    </div>
                    <button onClick={() => mp3BatchInputRef.current?.click()} style={{ background: "#fc3c44", border: "none", borderRadius: 18, color: "#fff", cursor: "pointer", padding: "8px 16px", fontSize: 12, fontWeight: 700 }}>Musik laden</button>
                  </div>
                )}

                {tracks.length > 0 ? (
                  <div style={{ background: "rgba(28, 28, 30, 0.6)", borderRadius: 20, border: "1px solid rgba(255,255,255,0.06)", overflow: "hidden", backdropFilter: "blur(30px)" }}>
                    <div style={{ padding: "14px 18px", fontSize: 12, fontWeight: 700, color: "#8e8e93", textTransform: "uppercase", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
                      {tracks.length} Titel (Zieh am Symbol ☰ zum Sortieren)
                    </div>
                    <div style={{ maxHeight: 420, overflowY: "auto" }}>
                      {tracks.map((t, i) => (
                        <div 
                          key={t.id} 
                          className={`track-row ${draggedIdx === i ? 'dragging' : ''}`}
                          draggable
                          onDragStart={(e) => handleDragStart(e, i)}
                          onDragOver={(e) => handleDragOver(e, i)}
                          onDragEnd={handleDragEnd}
                          onClick={() => { playTrack(i); setView("player"); }}
                          style={{ display: "flex", alignItems: "center", padding: "12px 16px", gap: 14, cursor: "pointer", background: i === currentIdx ? "rgba(252, 60, 68, 0.08)" : "transparent", borderBottom: i < tracks.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none" }}>

                          {/* Cover Thumbnail */}
                          <div style={{ width: 44, height: 44, borderRadius: 8, background: "#2c2c2e", flexShrink: 0, overflow: "hidden", position: "relative", display: "flex", alignItems: "center", justifyContent: "center", border: "1px solid rgba(255,255,255,0.05)" }}>
                            {t.art ? <img src={t.art} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <MusicNote />}
                            <div className="art-overlay" onClick={(e) => openArtPicker(i, e)} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
                              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </div>
                            {i === currentIdx && playing && (
                              <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                                <Bars n={3} size="sm" />
                              </div>
                            )}
                          </div>

                          {/* Details */}
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: 14, fontWeight: i === currentIdx ? 600 : 500, color: i === currentIdx ? "#fc3c44" : "#ffffff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{t.name}</div>
                            <div style={{ fontSize: 12, color: "#8e8e93", marginTop: 2 }}>{t.art ? "Album-Artwork" : "Kein Artwork"}</div>
                          </div>

                          {/* iOS Sort Symbol & Löschen */}
                          <div style={{ display: "flex", alignItems: "center", gap: 12 }} onClick={(e) => e.stopPropagation()}>
                            <button onClick={(e) => removeTrack(i, e)} className="icon-btn" style={{ background: "none", border: "none", cursor: "pointer", color: "#8e8e93", fontSize: 18, width: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center" }}
                              onMouseEnter={(e) => e.currentTarget.style.color = "#fc3c44"}
                              onMouseLeave={(e) => e.currentTarget.style.color = "#8e8e93"}>×</button>
                            
                            <div style={{ cursor: "grab", display: "flex", alignItems: "center", padding: "4px" }} title="Ziehen zum Sortieren">
                              <DragIcon />
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : (
                  <div style={{ textAlign: "center", padding: "48px 20px", color: "#8e8e93", fontSize: 14 }}>
                    Keine Lieder geladen · Ziehe Songs oder klicke oben, um zu starten.
                  </div>
                )}
              </div>
            )}

            <div style={{ textAlign: "center", marginTop: 28, fontSize: 11, color: "#48484a", fontWeight: 500 }}>
              Kompatibel mit iOS Sperrbildschirm & Media Session Control
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<MusicPlayer />);
  </script>
</body>
</html>
